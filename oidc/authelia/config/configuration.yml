    lifespans:
      access_token: '1h'
      authorize_code: '1m'
      id_token: '1h'
      refresh_token: '90m'

    # This policy puts "groups" directly in the ID token. Without it, groups only show up in the UserInfo endpoint, and Distroface wouldn't read roles.
    claims_policies:
      distroface:
        id_token:
          - 'groups'
          - 'email'
          - 'email_verified'
          - 'preferred_username'
          - 'name'

    cors:
      endpoints:
        - 'authorization'
        - 'token'
        - 'revocation'
        - 'introspection'
        - 'userinfo'
      allowed_origins_from_client_redirect_uris: true

    clients:
      - client_id: 'distroface'
        client_name: 'Distroface'
        # Plaintext secret: distroface-dev-secret
        client_secret: '$pbkdf2-sha512$310000$rjIc/fKRSBnSAe/FKJa.aQ$KIJjfQsCOexmk52nLb73HmJrcMkiDl3GRuWWpmdJN.talWSB.p7cq7zbiiVj4P0xV3YMeJtdlMfzWSVU2XSblw'
        public: false
        authorization_policy: 'one_factor'
        claims_policy: 'distroface'
        redirect_uris:
          - 'http://localhost:8080/api/v1/auth/oidc/callback'
          - 'http://localhost:5173/api/v1/auth/oidc/callback'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
          - 'offline_access'
        grant_types:
          - 'authorization_code'
          - 'refresh_token'
        response_types:
          - 'code'
        response_modes:
          - 'query'
          - 'form_post'
        token_endpoint_auth_method: 'client_secret_basic'

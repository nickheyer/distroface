---
# Distroface - Authelia Configuration
#
# This config is ready to use for development/testing.
# For production, change ALL secrets and generate new keys.

server:
  address: 'tcp://:9091'
  tls:
    certificate: '/config/tls.crt'
    key: '/config/tls.key'

log:
  level: 'info'

totp:
  issuer: 'distroface'

identity_validation:
  reset_password:
    jwt_secret: 'distroface-dev-jwt-reset-secret-change-me-in-production'

# User accounts are stored in ./users_database.yml
authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2'
      argon2:
        variant: 'argon2id'
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

# Authelia needs a cookie domain for its login portal. ../docker-compose.yaml for instruction
session:
  secret: 'distroface-dev-session-secret-change-me-in-production'
  cookies:
    - name: 'authelia_session'
      domain: 'traefik.me'
      authelia_url: 'https://authelia.traefik.me:9091'
      expiration: '1 hour'
      inactivity: '5 minutes'

storage:
  encryption_key: 'distroface-dev-storage-encryption-key-change-me'
  local:
    path: '/config/db.sqlite3'

notifier:
  filesystem:
    filename: '/config/notification.txt'

access_control:
  default_policy: 'one_factor'

regulation:
  max_retries: 5
  find_time: '2 minutes'
  ban_time: '5 minutes'

identity_providers:
  oidc:
    hmac_secret: 'distroface-dev-hmac-secret-must-be-at-least-sixty-four-characters-long-so-here-is-padding'
    enable_client_debug_messages: true
    minimum_parameter_entropy: 8
    enforce_pkce: 'public_clients_only'


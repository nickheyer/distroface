# Distroface Config File

server:
  port: "8080"
  host: "0.0.0.0"
  hostname: "localhost:8080"
  read_timeout: 15
  write_timeout: 15
  idle_timeout: 60

# Storage configuration
storage:
  data_dir: "./data"

# Database configuration
database:
  # path: "./data/distroface.db"    # Derived from storage.data_dir when unset
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

# Registry configuration
registry:
  # storage_path: "./data/registry"   # Derived from storage.data_dir when unset

# Auth configuration
auth:
  session_timeout: 86400      # 24 hours in seconds
  token_expiry: 900           # 15 minutes for registry tokens
  anonymous_access: false
  # jwt_secret: ""              # Generated and persisted when unset
  local:
    enabled: true
    allow_registration: true
  # oidc:
  #   enabled: true
  #   issuer_uri: "https://idp.example.com/realms/main"
  #   client_id: "distroface"
  #   client_secret: "..."
  #   redirect_url: "https://registry.example.com/api/v1/auth/oidc/callback"
  #   role_claim: "roles"        # Claim mapped to distroface roles
  #   role_mapping:              # Idp role value -> distroface role
  #     registry-admins: admin
  #   group_claim: "groups"      # Claim listing idp groups
  #   group_org_mapping:         # Idp group -> org membership
  #     platform-team: platform

# Startup seeding, entries are created once and never updated
# bootstrap:
#   users:
#     - username: "admin"
#       password: "changeme"        # Required
#       email: "admin@example.com"  # Optional
#       roles: ["admin"]            # System roles, default roles when omitted
#     - username: "dev"
#       password: "changeme"
#   orgs:
#     - name: "platform"
#       display_name: "Platform Team"  # Defaults to name
#       description: ""
#       members:
#         - username: "admin"
#           role: "owner"           # owner, admin, or member (default)
#         - username: "dev"

# Artifact repositories
artifacts:
  # storage_path: "./data/artifacts"  # Derived from storage.data_dir when unset
  max_file_size_mb: 10240     # Zero means unlimited
  v1_compat: true             # Serve the v1 facade for old dfcli and ci
  stale_upload_cleanup_hours: 24  # Abandoned upload sessions swept after this
  retention:
    enabled: false
    max_versions: 5           # Newest versions kept per path zero means unlimited
    max_age_days: 0           # Age based pruning in days zero disables
    max_total_size: 0         # Total bytes kept per repo zero means unlimited
    exclude_latest: true      # Never age-prune the newest artifact of a path
  reaper:
    enabled: false            # Scheduled retention sweep across all repos
    interval_hours: 24

# Registry garbage collection
gc:
  enabled: false          # Scheduled mark and sweep
  interval_hours: 24
  remove_untagged: false  # Scheduled runs also drop untagged manifests

# Webhook delivery
webhooks:
  # Private lan targets blocked unless this turned on
  allow_private_networks: false

# Rate limiting
rate_limit:
  auth_failure_limit: 10     # Failed tries per ip before lockout zero disables
  auth_failure_window: 300   # Lockout window in seconds
  pull_per_minute: 0         # Pulls per user per minute zero means unlimited
  anon_pull_per_minute: 0    # Anon pulls per ip per minute zero means unlimited

# Logging configuration
logging:
  enabled: true
  # dir: "./data/logs"          # Derived from storage.data_dir when unset
  max_size: 10
  max_backups: 5
  max_age: 30
  compress: true

# Distroface Config File

server:
  port: "8080"
  host: "0.0.0.0"
  read_timeout: 15
  write_timeout: 15
  idle_timeout: 60

# Database configuration
database:
  path: "./data/distroface.db"
  max_connections: 25
  max_idle_conns: 5
  conn_max_lifetime: 300


# Registry configuration
registry:
  storage_path: "./data/registry"

# Auth configuration
auth:
  session_duration: 86400       # 24 hours in seconds
  token_expiry: 900             # 15 minutes for registry tokens
  # oidc:
  #   enabled: true
  #   issuer_uri: "https://idp.example.com/realms/main"
  #   client_id: "distroface"
  #   client_secret: "..."
  #   redirect_url: "https://registry.example.com/api/v1/auth/oidc/callback"
  #   role_claim: "roles"        # Claim mapped to distroface roles
  #   group_claim: "groups"      # Claim listing idp groups
  #   group_org_mapping:         # Idp group -> org membership
  #     platform-team: platform

# Registry garbage collection
gc:
  enabled: false          # Scheduled mark and sweep
  interval_hours: 24
  remove_untagged: false  # Scheduled runs also drop untagged manifests

# Webhook delivery
webhooks:
  # Private lan targets blocked unless this turned on
  allow_private_networks: false

# Rate limiting
rate_limit:
  auth_failure_limit: 10     # Failed tries per ip before lockout zero disables
  auth_failure_window: 300   # Lockout window in seconds
  pull_per_minute: 0         # Pulls per user per minute zero means unlimited
  anon_pull_per_minute: 0    # Anon pulls per ip per minute zero means unlimited

# Storage configuration
storage:
  data_dir: "./data"
  backup_dir: "./backups"
  temp_dir: "./tmp"
  max_upload_size: 524288000  # 500MB in bytes

# Logging configuration
logging:
  enabled: true
  file_path: "./data/distroface.log"
  max_size: 10
  max_backups: 5
  max_age: 30
  compress: true

syntax = "proto3";

package distroface.v1;

import "distroface/v1/types.proto";

option go_package = "github.com/nickheyer/distroface/pkg/proto/distroface/v1;distrofacev1";

// AuthService handles user authentication and session management.
service AuthService {
  // Register creates a new user account.
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  // Login authenticates a user and returns a session token.
  rpc Login(LoginRequest) returns (LoginResponse) {}
  // Logout invalidates the current session.
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
  // GetCurrentUser returns the currently authenticated user.
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse) {}
  // RefreshSession extends the current session.
  rpc RefreshSession(RefreshSessionRequest) returns (RefreshSessionResponse) {}
}

// RegisterRequest contains the fields needed to create a new account.
message RegisterRequest {
  // username is the desired username.
  string username = 1;
  // email is the user's email address.
  string email = 2;
  // password is the desired password.
  string password = 3;
}

// RegisterResponse contains the newly created user and session.
message RegisterResponse {
  // user is the newly created user.
  User user = 1;
  // session_token is the authentication token for the new session.
  string session_token = 2;
}

// LoginRequest contains credentials for authentication.
message LoginRequest {
  // identifier is a username or email address.
  string identifier = 1;
  // password is the user's password.
  string password = 2;
}

// LoginResponse contains the authenticated user and session.
message LoginResponse {
  // user is the authenticated user.
  User user = 1;
  // session_token is the authentication token for the new session.
  string session_token = 2;
}

// LogoutRequest is empty; the session is identified from the auth header.
message LogoutRequest {}

// LogoutResponse is empty on success.
message LogoutResponse {}

// GetCurrentUserRequest is empty; the user is identified from the auth header.
message GetCurrentUserRequest {}

// GetCurrentUserResponse contains the current user.
message GetCurrentUserResponse {
  // user is the currently authenticated user.
  User user = 1;
}

// RefreshSessionRequest is empty; the session is identified from the auth header.
message RefreshSessionRequest {}

// RefreshSessionResponse contains the refreshed session token.
message RefreshSessionResponse {
  // session_token is the new authentication token.
  string session_token = 1;
  // expires_at is when the new session expires.
  int64 expires_at = 2;
}

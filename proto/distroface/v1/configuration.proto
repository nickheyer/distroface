syntax = "proto3";

package distroface.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/nickheyer/distroface/pkg/proto/distroface/v1;distrofacev1";

// ConfigurationService exposes safe, frontend-relevant configuration.
service ConfigurationService {
  // GetConfiguration returns whitelisted config entries as key-value pairs.
  rpc GetConfiguration(GetConfigurationRequest) returns (GetConfigurationResponse) {}
  // GetStorageUsage returns registry and artifact disk usage, broken down per namespace/repo.
  rpc GetStorageUsage(GetStorageUsageRequest) returns (GetStorageUsageResponse) {}
}

// GetConfigurationRequest is an empty request.
message GetConfigurationRequest {}

// ConfigEntry is a single configuration key-value pair.
message ConfigEntry {
  // key is the dot-separated config key (e.g. "server.hostname").
  string key = 1;
  // value is the config value as an arbitrary JSON-like value.
  google.protobuf.Value value = 2;
}

// GetConfigurationResponse contains the whitelisted config entries.
message GetConfigurationResponse {
  // entries is the list of config entries.
  repeated ConfigEntry entries = 1;
}

// GetStorageUsageRequest is an empty request.
message GetStorageUsageRequest {}

// StorageUsageEntry is disk usage attributed to one namespace or repo.
message StorageUsageEntry {
  // name is the registry namespace or artifact repository name.
  string name = 1;
  // bytes is the attributed storage in bytes.
  int64 bytes = 2;
  // count is the number of repositories (registry) or artifacts (artifact repo).
  int32 count = 3;
}

// GetStorageUsageResponse contains registry and artifact storage usage.
message GetStorageUsageResponse {
  // registry_bytes is unique image blob bytes on disk (deduplicated).
  int64 registry_bytes = 1;
  // artifact_bytes is unique artifact blob bytes on disk (deduplicated).
  int64 artifact_bytes = 2;
  // registry_namespaces is the five largest namespaces by usage.
  // Layers shared across namespaces are counted in each, so entries can sum above registry_bytes.
  repeated StorageUsageEntry registry_namespaces = 3;
  // artifact_repos is the five largest artifact repositories by usage.
  repeated StorageUsageEntry artifact_repos = 4;
}

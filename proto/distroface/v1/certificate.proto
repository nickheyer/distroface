syntax = "proto3";

package distroface.v1;

import "distroface/v1/pagination.proto";
import "distroface/v1/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/nickheyer/distroface/pkg/proto/distroface/v1;distrofacev1";

// Manages tls certificate domains and acme issuance, system admins manage
// system scope, org admins manage domains matching their portal hostnames
service CertificateService {
  // Reports whether tls/acme is active and how it is configured
  rpc GetTLSStatus(GetTLSStatusRequest) returns (GetTLSStatusResponse) {}
  // Lists registered domains, org scoped when org_id is set
  rpc ListCertificateDomains(ListCertificateDomainsRequest) returns (ListCertificateDomainsResponse) {}
  // Registers a domain as allowed to receive certificates
  rpc AddCertificateDomain(AddCertificateDomainRequest) returns (AddCertificateDomainResponse) {}
  // Removes a registered domain
  rpc RemoveCertificateDomain(RemoveCertificateDomainRequest) returns (RemoveCertificateDomainResponse) {}
  // Removes multiple registered domains in one call
  rpc BulkRemoveCertificateDomains(BulkRemoveCertificateDomainsRequest) returns (BulkRemoveCertificateDomainsResponse) {}
  // Marks an org scoped domain as allowed to issue, system admin only
  rpc ApproveCertificateDomain(ApproveCertificateDomainRequest) returns (ApproveCertificateDomainResponse) {}
  // Requests immediate issuance for a registered domain, blocks until done
  rpc IssueCertificate(IssueCertificateRequest) returns (IssueCertificateResponse) {}
  // Updates runtime acme settings, applied live, system admin only
  rpc UpdateACMESettings(UpdateACMESettingsRequest) returns (UpdateACMESettingsResponse) {}
  // Uploads pem tls material for the app, an org, an org ca, or a portal
  rpc UploadTLSCertificate(UploadTLSCertificateRequest) returns (UploadTLSCertificateResponse) {}
  // Removes uploaded tls material
  rpc DeleteTLSCertificate(DeleteTLSCertificateRequest) returns (DeleteTLSCertificateResponse) {}
  // Reports uploaded tls material for the app, an org, or a portal
  rpc GetTLSMaterial(GetTLSMaterialRequest) returns (GetTLSMaterialResponse) {}
  // Mints a fresh standalone signing ca for an org, replacing any existing one
  rpc GenerateOrgCA(GenerateOrgCARequest) returns (GenerateOrgCAResponse) {}
  // Mints the instance root ca, system admin only
  rpc GenerateAppCA(GenerateAppCARequest) returns (GenerateAppCAResponse) {}
  // Signs an org intermediate from the instance root, replacing any org ca
  rpc IssueOrgICA(IssueOrgICARequest) returns (IssueOrgICAResponse) {}
  // Resolved certificate state for the app or a portal, with problems
  rpc GetCertStatus(GetCertStatusRequest) returns (GetCertStatusResponse) {}
}

// Where a served certificate comes from, portals use none/acme/org_ca/
// org_cert/manual, the app primary uses config/manual/acme/app_ca
enum CertSource {
  CERT_SOURCE_UNSPECIFIED = 0;
  CERT_SOURCE_NONE = 1; // Cleartext only
  CERT_SOURCE_CONFIG = 2; // cert_file/key_file pair from the config
  CERT_SOURCE_MANUAL = 3; // Uploaded pem material
  CERT_SOURCE_ACME = 4; // Automatic issuance from an acme ca
  CERT_SOURCE_ORG_CA = 5; // Minted on demand from the org signing ca
  CERT_SOURCE_ORG_CERT = 6; // The org's shared uploaded certificate
  CERT_SOURCE_APP_CA = 7; // Minted on demand from the instance root ca
}

// Storage target of uploaded tls material
enum TLSScope {
  TLS_SCOPE_UNSPECIFIED = 0;
  TLS_SCOPE_APP = 1; // Certificate serving the primary hostname
  TLS_SCOPE_APP_CA = 2; // Instance root ca
  TLS_SCOPE_ORG = 3; // Org shared certificate
  TLS_SCOPE_ORG_CA = 4; // Org signing ca
  TLS_SCOPE_PORTAL = 5; // Certificate for a single portal
}

// Who owns a hostname registration
enum CertificateDomainScope {
  CERTIFICATE_DOMAIN_SCOPE_UNSPECIFIED = 0;
  CERTIFICATE_DOMAIN_SCOPE_SYSTEM = 1; // Instance level, always approved
  CERTIFICATE_DOMAIN_SCOPE_ORG = 2; // Claimed by an organization
}

// Computed serving state for a certificate target
enum CertState {
  CERT_STATE_UNSPECIFIED = 0;
  CERT_STATE_NONE = 1; // Cleartext, no certificate expected
  CERT_STATE_PENDING = 2; // Source configured, certificate not servable yet
  CERT_STATE_READY = 3; // Handshakes serve a valid certificate
  CERT_STATE_ERROR = 4; // Source configured but handshakes will fail
}

// Live certificate details read from the acme cache
message CertificateInfo {
  bool issued = 1;
  string issuer = 2;
  google.protobuf.Timestamp not_before = 3;
  google.protobuf.Timestamp not_after = 4;
  repeated string sans = 5;
}

// A hostname allowed to receive acme certificates
message CertificateDomain {
  string id = 1;
  string domain = 2;
  CertificateDomainScope scope = 3;
  string org_id = 4; // Set when scope is org
  string org_name = 5; // Display label for org_id
  string created_by = 6;
  google.protobuf.Timestamp created_at = 7;
  CertificateInfo cert = 8;
  bool approved = 9; // Org domains need system admin approval before issuance
  string approved_by = 10;
}

// Empty
message GetTLSStatusRequest {}

// Effective tls configuration, secrets excluded
message GetTLSStatusResponse {
  bool tls_enabled = 1;
  bool acme_enabled = 2;
  string acme_email = 3;
  string acme_directory = 4; // Empty means lets encrypt production
  bool manual_cert = 5;
  repeated string config_domains = 6;
  string primary_hostname = 7;
  CertificateInfo primary_cert = 8;
  TLSMaterialInfo app_cert = 9; // Uploaded app certificate, null when none
  string acme_http_port = 10; // Cleartext challenge port from config, empty disables http-01
  CertSource primary_source = 11; // config, manual, or acme
  repeated string hostname_blacklist = 12; // Blocked hostname patterns, exact or *.suffix
  bool require_hostname_approval = 13; // Org hostnames need admin approval when true
  TLSMaterialInfo app_ca = 14; // Instance root ca, cert_pem populated for download
}

// Parsed details of uploaded pem material, keys never leave the server
message TLSMaterialInfo {
  string subject = 1;
  string issuer = 2;
  google.protobuf.Timestamp not_before = 3;
  google.protobuf.Timestamp not_after = 4;
  repeated string sans = 5;
  bool is_ca = 6;
  string created_by = 7;
  google.protobuf.Timestamp updated_at = 8;
  string cert_pem = 9; // Public chain only, set on org ca reads for download
}

// Unset fields keep their current value
message UpdateACMESettingsRequest {
  optional bool enabled = 1;
  optional string email = 2;
  optional string directory_url = 3;
  CertSource primary_source = 4; // config, manual, or acme, unspecified keeps
  optional bool require_hostname_approval = 5;
  repeated string hostname_blacklist = 6; // Applied only when set_blacklist is true
  bool set_blacklist = 7;
}

// Status after the update
message UpdateACMESettingsResponse {
  GetTLSStatusResponse status = 1;
}

// Scopes app and app_ca need a system admin, org scopes need an org admin
message UploadTLSCertificateRequest {
  TLSScope scope = 1;
  string org_id = 2; // Required for org, org_ca, and portal scopes
  string portal_id = 3; // Required for portal scope
  string cert_pem = 4;
  string key_pem = 5;
}

// The stored material
message UploadTLSCertificateResponse {
  TLSMaterialInfo info = 1;
}

// Same scoping rules as upload
message DeleteTLSCertificateRequest {
  TLSScope scope = 1;
  string org_id = 2;
  string portal_id = 3;
}

// Empty
message DeleteTLSCertificateResponse {}

// Empty org_id reports app scope, portal_id narrows to one portal
message GetTLSMaterialRequest {
  string org_id = 1;
  string portal_id = 2;
}

// Only fields matching the requested scope are set
message GetTLSMaterialResponse {
  TLSMaterialInfo app_cert = 1;
  TLSMaterialInfo org_cert = 2;
  TLSMaterialInfo org_ca = 3; // cert_pem populated for download
  TLSMaterialInfo portal_cert = 4;
  TLSMaterialInfo app_ca = 5; // cert_pem populated for download
  bool app_ca_exists = 6; // Set on org reads so admins know an ica can be issued
}

// Common name defaults to the org name
message GenerateOrgCARequest {
  string org_id = 1;
  string common_name = 2;
}

// The new ca, cert_pem populated for download
message GenerateOrgCAResponse {
  TLSMaterialInfo org_ca = 1;
}

// Common name defaults to the instance hostname
message GenerateAppCARequest {
  string common_name = 1;
}

// The new instance root, cert_pem populated for download
message GenerateAppCAResponse {
  TLSMaterialInfo app_ca = 1;
}

// Common name defaults to the org name
message IssueOrgICARequest {
  string org_id = 1;
  string common_name = 2;
}

// The new intermediate with the root chain, cert_pem populated for download
message IssueOrgICAResponse {
  TLSMaterialInfo org_ca = 1;
}

// Empty ids resolve the app tier, portal_id needs org_id
message GetCertStatusRequest {
  string org_id = 1;
  string portal_id = 2;
}

// What the engine would serve for the target right now and why not
message GetCertStatusResponse {
  CertSource source = 1; // Portal cert source, or the app primary source
  CertState state = 2;
  repeated string problems = 3; // Human readable blockers, empty when ready
  string acme_directory = 4; // Effective directory after tier inheritance
  string acme_email = 5; // Effective email after tier inheritance
  TLSMaterialInfo serving_cert = 6; // Stored material details when the source uses uploads
  CertificateInfo acme_cert = 7; // Cached acme cert details when the source is acme
}

// Org scoped listing when org_id set, admins may pass empty for all
message ListCertificateDomainsRequest {
  PageRequest page = 1;
  string org_id = 2;
  CertificateDomainScope scope = 3; // Unspecified lists both scopes
  bool pending_only = 4; // Only registrations awaiting approval
}

// Registered domains with live cert details
message ListCertificateDomainsResponse {
  repeated CertificateDomain domains = 1;
  PageInfo page = 2;
}

// Org scope when org_id set, domain must match an org portal hostname
message AddCertificateDomainRequest {
  string domain = 1;
  string org_id = 2;
}

// The registered domain
message AddCertificateDomainResponse {
  CertificateDomain domain = 1;
}

// Org id required for org scoped domains
message RemoveCertificateDomainRequest {
  string id = 1;
  string org_id = 2;
}

// Empty
message RemoveCertificateDomainResponse {}

// Domain ids to remove, org id required for org scoped domains
message BulkRemoveCertificateDomainsRequest {
  repeated string ids = 1;
  string org_id = 2;
}

// Per domain failures, removed count covers the rest
message BulkRemoveCertificateDomainsResponse {
  int32 removed_count = 1;
  repeated BulkOperationError errors = 2;
}

// Domain id to approve
message ApproveCertificateDomainRequest {
  string id = 1;
}

// The approved domain
message ApproveCertificateDomainResponse {
  CertificateDomain domain = 1;
}

// Domain must already be registered or statically allowed
message IssueCertificateRequest {
  string domain = 1;
  string org_id = 2;
}

// Certificate details after issuance
message IssueCertificateResponse {
  CertificateInfo cert = 1;
}

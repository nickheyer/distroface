# goreleaser config for dfcli — cross-platform static binaries published via
# the artifact repo (as v1 did with the DFCli repo). The distroface server is
# intentionally NOT built here: it needs CGO for sqlite.
version: 2

project_name: dfcli

builds:
  - id: dfcli
    main: ./cmd/dfcli
    binary: dfcli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: dfcli
    ids: [dfcli]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "dfcli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

release:
  disable: true # Binaries are published to the DFCli artifact repo, not GitHub

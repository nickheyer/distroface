name: DistroFace Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-proto:
    name: Generate Proto Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate proto code
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/workspace" \
            --workdir /workspace \
            bufbuild/buf:latest generate

      - name: Upload generated Go proto code
        uses: actions/upload-artifact@v4
        with:
          name: proto-go
          path: pkg/proto
          retention-days: 1

      - name: Upload generated TypeScript proto code
        uses: actions/upload-artifact@v4
        with:
          name: proto-ts
          path: web/distroface/src/lib/proto
          retention-days: 1

  build-frontend:
    name: Build Frontend
    needs: generate-proto
    if: ${{ startsWith(github.ref, 'refs/tags/') && !endsWith(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated TypeScript proto code
        uses: actions/download-artifact@v4
        with:
          name: proto-ts
          path: web/distroface/src/lib/proto

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/distroface/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web/distroface
          npm ci

      - name: Build frontend
        run: |
          cd web/distroface
          APP_VERSION=${{ github.ref_name }} npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/distroface/build
          retention-days: 1

  build-distroface:
    name: Build DistroFace Binaries
    needs: [generate-proto, build-frontend]
    if: ${{ startsWith(github.ref, 'refs/tags/') && !endsWith(github.ref_name, '-dev') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cc: x86_64-w64-mingw32-gcc
            cxx: x86_64-w64-mingw32-g++

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated Go proto code
        uses: actions/download-artifact@v4
        with:
          name: proto-go
          path: pkg/proto

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: web/distroface/build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compiler (Windows)
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: |
          BIN=distroface
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN=distroface.exe; fi
          go build -ldflags "-s -w" -o "$BIN" ./cmd/distroface

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="distroface_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" distroface.exe
          else
            tar -czf "${NAME}.tar.gz" distroface
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            distroface_*.tar.gz
            distroface_*.zip
          if-no-files-found: error
          retention-days: 1

  build-dfcli:
    name: Build dfcli Binaries
    needs: generate-proto
    if: ${{ startsWith(github.ref, 'refs/tags/') && !endsWith(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download generated Go proto code
        uses: actions/download-artifact@v4
        with:
          name: proto-go
          path: pkg/proto

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dfcli-dist
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
          retention-days: 1

  build-docker:
    name: Build Docker (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare platform slug
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: nickheyer/distroface

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.distroface
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=nickheyer/distroface,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=docker-${{ env.PLATFORM_PAIR }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  push-docker-manifest:
    name: Push Docker Manifest
    needs: build-docker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (prod)
        id: meta
        if: ${{ startsWith(github.ref, 'refs/tags/') && !endsWith(github.ref_name, '-dev') }}
        uses: docker/metadata-action@v5
        with:
          images: |
            nickheyer/distroface
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Extract metadata (dev)
        id: meta-dev
        if: ${{ !startsWith(github.ref, 'refs/tags/') || endsWith(github.ref_name, '-dev') }}
        uses: docker/metadata-action@v5
        with:
          images: |
            nickheyer/distroface
          tags: |
            type=raw,value=dev
          flavor: |
            latest=false

      - name: Create and push manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'nickheyer/distroface@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect nickheyer/distroface:${{ steps.meta.outputs.version || steps.meta-dev.outputs.version }}

  create-release:
    name: Create GitHub Release
    needs: [build-distroface, build-dfcli, push-docker-manifest]
    if: ${{ startsWith(github.ref, 'refs/tags/') && !endsWith(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distroface binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: ./assets

      - name: Download dfcli binaries
        uses: actions/download-artifact@v4
        with:
          name: dfcli-dist
          path: ./assets

      - name: Generate checksums
        run: |
          cd assets
          sha256sum * > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${VERSION}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found"
            CHANGELOG="Initial release"
          else
            echo "Generating changelog from ${PREV_TAG} to ${VERSION}"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${VERSION})
          fi

          # Save to file for release body
          cat << EOF > RELEASE_NOTES.md
          ## What's Changed

          ${CHANGELOG}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: distroface ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ./assets/*

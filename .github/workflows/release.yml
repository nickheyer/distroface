name: DistroFace Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  generate-proto:
    name: Generate Proto Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate proto code
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/workspace" \
            --workdir /workspace \
            bufbuild/buf:latest generate

      - name: Upload generated Go proto code
        uses: actions/upload-artifact@v4
        with:
          name: proto-go
          path: pkg/proto
          retention-days: 1

      - name: Upload generated TypeScript proto code
        uses: actions/upload-artifact@v4
        with:
          name: proto-ts
          path: web/distroface/src/lib/proto
          retention-days: 1
  
      - name: Upload generated oapi schema
        uses: actions/upload-artifact@v4
        with:
          name: api-schema-yaml
          path: web/distroface/static/schemav1.yaml
          retention-days: 1

  build-frontend:
    name: Build Frontend
    needs: generate-proto
    if: ${{ !endsWith(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated TypeScript proto code
        uses: actions/download-artifact@v4
        with:
          name: proto-ts
          path: web/distroface/src/lib/proto

      - name: Download generated oapi schema
        uses: actions/download-artifact@v4
        with:
          name: api-schema-yaml
          path: web/distroface/static/schemav1.yaml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/distroface/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web/distroface
          npm ci

      - name: Build frontend
        run: |
          cd web/distroface
          APP_VERSION=${{ github.ref_name }} npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/distroface/build
          retention-days: 1

  build-binaries:
    name: Build Binaries
    needs: [generate-proto, build-frontend]
    if: ${{ !endsWith(github.ref_name, '-dev') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            runner: macOS-15
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
            runner: ubuntu-latest
            cc: x86_64-w64-mingw32-gcc
            cxx: x86_64-w64-mingw32-g++

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated Go proto code
        uses: actions/download-artifact@v4
        with:
          name: proto-go
          path: pkg/proto

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compiler (Windows)
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: web/distroface/build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: |
          go build -tags embed -o distroface-${{ matrix.suffix }} ./cmd/distroface

      - name: Compress binary (non-Windows)
        if: matrix.goos != 'windows'
        run: |
          tar -czf distroface-${{ matrix.suffix }}.tar.gz distroface-${{ matrix.suffix }}

      - name: Compress binary (Windows)
        if: matrix.goos == 'windows'
        run: |
          zip distroface-${{ matrix.suffix }}.zip distroface-${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            distroface-${{ matrix.suffix }}.tar.gz
            distroface-${{ matrix.suffix }}.zip
          if-no-files-found: error
          retention-days: 1

  build-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Extract metadata (prod)
        id: meta
        if: ${{ !endsWith(github.ref_name, '-dev') }}
        uses: docker/metadata-action@v5
        with:
          images: |
            nickheyer/distroface
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Extract metadata (dev)
        id: meta-dev
        if: ${{ endsWith(github.ref_name, '-dev') }}
        uses: docker/metadata-action@v5
        with:
          images: |
            nickheyer/distroface
          tags: |
            type=ref,event=tag
            type=raw,value=dev
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.distroface
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags || steps.meta-dev.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels || steps.meta-dev.outputs.labels }}
          no-cache: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}

  create-release:
    name: Create GitHub Release
    needs: [build-binaries, build-docker]
    if: ${{ !endsWith(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: ./artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${VERSION}^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found"
            CHANGELOG="Initial release"
          else
            echo "Generating changelog from ${PREV_TAG} to ${VERSION}"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${VERSION})
          fi
          
          # Save to file for release body
          cat << EOF > RELEASE_NOTES.md
          ## What's Changed
          
          ${CHANGELOG}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: distroface ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ./artifacts/**/*.tar.gz
            ./artifacts/**/*.zip

  notify-discord:
    name: Discord Notification
    needs: [create-release]
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.ref_name, '-dev') && needs.create-release.result == 'success' }}
    
    steps:
      - name: Send Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "distroface '"${VERSION}"' Released!",
                "description": "A new version of distroface has been released.",
                "url": "'"${RELEASE_URL}"'",
                "color": 5814783,
                "image": {
                  "url": "https://i.imgur.com/tqAz2h0.png"
                },
                "fields": [
                  {
                    "name": "Version",
                    "value": "`'"${VERSION}"'`",
                    "inline": true
                  },
                  {
                    "name": "Release Page",
                    "value": "[View Release]('"${RELEASE_URL}"')",
                    "inline": true
                  },
                  {
                    "name": "Docker Hub",
                    "value": "[View Images](https://hub.docker.com/r/nickheyer/distroface)",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "distroface Release"
                },
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'"
              }]
            }' \
            $DISCORD_WEBHOOK